services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: pxray_db
    environment:
      POSTGRES_USER: pxray
      POSTGRES_PASSWORD: pxray_password
      POSTGRES_DB: pxray
    ports:
      - "5432:5432"
    volumes:
      - pxray_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pxray"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.23
    container_name: pxray_neo4j
    environment:
      NEO4J_AUTH: neo4j/pxray_password
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - pxray_neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pxray_pg_data:
  pxray_neo4j_data:
