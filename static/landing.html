<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUX-RU</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      background:#f7f9fc;
      color:#0f172a;
      font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI',system-ui,sans-serif;
      display:grid;
      place-items:center;
      padding:28px;
    }
    main{
      width:min(760px,100%);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:800;
      letter-spacing:0;
      margin-bottom:24px;
    }
    .mark{
      width:24px;
      height:24px;
      border-radius:50%;
      background:linear-gradient(135deg,#3182f6,#7dd3fc 55%,#f7b6d2);
      box-shadow:0 0 0 5px #eaf2ff;
      flex:none;
    }
    h1{
      font-size:clamp(32px,5vw,54px);
      line-height:1.08;
      letter-spacing:0;
      font-weight:850;
      max-width:680px;
    }
    .lead{
      margin-top:14px;
      color:#64748b;
      font-size:16px;
      line-height:1.6;
      max-width:580px;
    }
    .choices{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:34px;
    }
    .choice{
      min-height:142px;
      border:1px solid #dbe3ef;
      border-radius:8px;
      background:#fff;
      color:#0f172a;
      text-decoration:none;
      padding:22px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease;
    }
    .choice:hover,.choice:focus-visible{
      transform:translateY(-2px);
      border-color:#3182f6;
      box-shadow:0 18px 36px -26px rgba(15,23,42,.45);
      outline:none;
    }
    .choice b{
      display:block;
      font-size:19px;
      line-height:1.3;
    }
    .choice span{
      color:#64748b;
      font-size:13px;
      line-height:1.5;
      margin-top:8px;
    }
    .go{
      align-self:flex-start;
      margin-top:18px;
      font-weight:800;
      color:#2563eb;
      font-size:13px;
    }
    .choice.primary{
      background:#0f172a;
      border-color:#0f172a;
      color:#fff;
    }
    .choice.primary span{color:#cbd5e1}
    .choice.primary .go{color:#93c5fd}
    @media(max-width:680px){
      body{place-items:start center;padding:24px 18px}
      main{padding-top:8vh}
      .choices{grid-template-columns:1fr}
      .choice{min-height:120px}
    }
  </style>
</head>
<body>
  <main>
    <div class="brand"><span class="mark"></span><span>LUX-RU</span></div>
    <h1>어떤 서비스로 시작할까요?</h1>
    <p class="lead">기존 분석 화면 또는 진단·검사·솔루션 흐름 중 하나를 선택하세요.</p>
    <div class="choices" aria-label="서비스 선택">
      <a class="choice primary" href="/original">
        <span>
          <b>기존 서비스</b>
          <span>현재 운영 중인 포트폴리오 분석 화면</span>
        </span>
        <span class="go">들어가기</span>
      </a>
      <a class="choice" href="/diagnosis-solution">
        <span>
          <b>진단 솔루션</b>
          <span>포트폴리오 진단부터 투자 성향 검사와 리밸런싱 제안까지</span>
        </span>
        <span class="go">시작하기</span>
      </a>
    </div>
  </main>
</body>
</html>
